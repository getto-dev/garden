<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Офлайн - Садовый менеджер</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    h1 {
      color: #166534;
      font-size: 24px;
      margin-bottom: 16px;
    }
    p {
      color: #15803d;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    button {
      background: #16a34a;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #15803d;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌱</div>
    <h1>Нет подключения к интернету</h1>
    <p>Проверьте соединение и попробуйте снова. Некоторые данные могут быть доступны из кэша.</p>
    <button onclick="window.location.reload()">Попробовать снова</button>
  </div>
</body>
</html>
